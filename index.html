<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JohnnyPinasLive.ph - Professional Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #map { height: 100vh; width: 100%; }
        
        /* Professional UI Panel */
        .ui-panel { 
            position: absolute; top: 15px; left: 15px; z-index: 1000; 
            background: rgba(255, 255, 255, 0.95); padding: 20px; 
            border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
            width: 280px; backdrop-filter: blur(5px);
        }
        h3 { margin-top: 0; color: #1877f2; margin-bottom: 15px; }
        input, textarea { 
            width: 100%; margin-bottom: 10px; padding: 10px; 
            box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; 
        }
        button { 
            width: 100%; background: #42b72a; color: white; border: none; 
            padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

<div id="map"></div>

<div class="ui-panel">
    <h3>JohnnyPinasLive.ph</h3>
    <input type="text" id="userName" placeholder="Your Name">
    <textarea id="statusUpdate" rows="2" placeholder="What's happening?"></textarea>
    <button onclick="postToMap()">Post to Map</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // Check if you are in Admin Mode (add ?admin=true to your URL)
    const urlParams = new URLSearchParams(window.location.search);
    const isAdmin = urlParams.get('admin') === 'true';

    const firebaseConfig = {
      apiKey: "AIzaSyAF_aWNBv5uACkRPpLywcrJKjU9D0EjhZ8",
      authDomain: "johnnypinaslive.firebaseapp.com",
      databaseURL: "https://johnnypinaslive-default-rtdb.firebaseio.com",
      projectId: "johnnypinaslive",
      storageBucket: "johnnypinaslive.firebasestorage.app",
      messagingSenderId: "755828275985",
      appId: "1:755828275985:web:1c80f5367d7d409f6daab0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const postsRef = ref(db, 'posts');

    const map = L.map('map').setView([10.245, 123.790], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    window.postToMap = function() {
        const name = document.getElementById('userName').value;
        const text = document.getElementById('statusUpdate').value;
        if(name && text) {
            push(postsRef, { 
                username: name, 
                message: text, 
                coords: [10.245 + (Math.random()*0.01), 123.790 + (Math.random()*0.01)],
                timestamp: Date.now(),
                friendId: "USER_" + Math.floor(Math.random() * 10000) 
            });
            document.getElementById('statusUpdate').value = "";
            alert("Posted successfully!");
        }
    }

    onChildAdded(postsRef, (data) => {
        const post = data.val();
        // Readable Time Formatting
        const time = new Date(post.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        
        let content = `<b>${post.username}</b><br>${post.message}<br><small style="color:#666">${time}</small>`;
        
        // Admin View: Only visible if ?admin=true is in the URL
        if(isAdmin) {
            content += `<br><b style="color:red">Admin ID: ${post.friendId}</b>`;
        }

        L.marker(post.coords).addTo(map).bindPopup(content);
    });
</script>

</body>
</html>
