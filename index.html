<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JohnnyPinasLive.ph - Pro Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #map { height: 100vh; width: 100%; }
        
        .ui-panel { 
            position: absolute; top: 15px; left: 15px; z-index: 1000; 
            background: rgba(255, 255, 255, 0.95); padding: 20px; 
            border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
            width: 280px; backdrop-filter: blur(5px);
        }
        h3 { margin-top: 0; color: #1877f2; margin-bottom: 15px; }
        input, textarea { 
            width: 100%; margin-bottom: 10px; padding: 10px; 
            box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; 
        }
        button { 
            width: 100%; background: #42b72a; color: white; border: none; 
            padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-bottom: 8px;
        }
        .loc-btn { background: #1877f2; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="ui-panel">
    <h3>JohnnyPinasLive.ph</h3>
    <input type="text" id="userName" placeholder="Your Name">
    <textarea id="statusUpdate" rows="2" placeholder="What's happening?"></textarea>
    
    <button class="loc-btn" onclick="getLocation()">📍 Get My Location</button>
    <button onclick="postToMap()">Post to Map</button>
    <small id="statusText" style="color: #666; display: block; text-align: center;">Status: Ready</small>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAF_aWNBv5uACkRPpLywcrJKjU9D0EjhZ8",
      authDomain: "johnnypinaslive.firebaseapp.com",
      databaseURL: "https://johnnypinaslive-default-rtdb.firebaseio.com",
      projectId: "johnnypinaslive",
      storageBucket: "johnnypinaslive.firebasestorage.app",
      messagingSenderId: "755828275985",
      appId: "1:755828275985:web:1c80f5367d7d409f6daab0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const postsRef = ref(db, 'posts');

    const map = L.map('map').setView([10.245, 123.790], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let currentLat = 10.245;
    let currentLng = 123.790;

    window.getLocation = function() {
        const status = document.getElementById('statusText');
        status.innerText = "Finding location...";
        
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                currentLat = pos.coords.latitude;
                currentLng = pos.coords.longitude;
                status.innerText = "✅ Location Locked!";
                map.setView([currentLat, currentLng], 16);
            }, () => {
                status.innerText = "❌ Location Failed";
            });
        }
    }

    window.postToMap = function() {
        const name = document.getElementById('userName').value;
        const text = document.getElementById('statusUpdate').value;
        if(name && text) {
            push(postsRef, { 
                username: name, 
                message: text, 
                coords: [currentLat, currentLng],
                timestamp: Date.now()
            });
            document.getElementById('statusUpdate').value = "";
            alert("Posted successfully!");
        }
    }

    onChildAdded(postsRef, (data) => {
        const post = data.val();
        const time = new Date(post.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        L.marker(post.coords).addTo(map).bindPopup(`<b>${post.username}</b><br>${post.message}<br><small>${time}</small>`);
    });
</script>
</body>
</html>
