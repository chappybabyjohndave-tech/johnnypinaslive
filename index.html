<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JohnnyPinasLive.ph - Community Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background: #f0f2f5; }
        #header { background: #1877f2; color: white; padding: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        #map { height: 450px; width: 90%; margin: 20px auto; border-radius: 15px; border: 3px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .controls { padding: 20px; display: flex; flex-direction: column; align-items: center; background: white; margin: 10px; border-radius: 15px; }
        input, textarea, select { width: 80%; max-width: 400px; padding: 12px; margin: 8px; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; }
        button { background: #42b72a; color: white; border: none; padding: 12px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 18px; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #36a420; transform: scale(1.05); }
        .footer { text-align: center; color: #65676b; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>

<div id="header">
    <h1>JohnnyPinasLive.ph 🇵🇭</h1>
    <p>Live Community Updates & Traffic Flow</p>
</div>

<div id="map"></div>

<div class="controls">
    <h3>📢 Post a Live Update</h3>
    <input type="text" id="userName" placeholder="Your Name">
    <textarea id="statusUpdate" rows="2" placeholder="What's happening?"></textarea>
    <button onclick="postToMap()">Post to Map</button>

    <hr style="width: 80%; margin: 20px 0;">

    <h3>🚦 Report Traffic Flow</h3>
    <input type="text" id="startCoord" placeholder="Start (Lat,Lng) e.g. 10.24,123.79">
    <input type="text" id="endCoord" placeholder="End (Lat,Lng) e.g. 10.25,123.80">
    <select id="trafficStatus">
        <option value="#42b72a">🟢 Clear Flow</option>
        <option value="#ffcc00">🟡 Slow Traffic</option>
        <option value="#ff3333">🔴 Heavy/Blocked</option>
    </select>
    <button onclick="postTraffic()" style="background: #1877f2;">Post Traffic Line</button>
</div>

<div class="footer">Created by Johnny Ang | © 2026</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAF_aWNBv5uACkRPpLywcrJKjU9D0EjhZ8",
      authDomain: "johnnypinaslive.firebaseapp.com",
      databaseURL: "https://johnnypinaslive-default-rtdb.firebaseio.com",
      projectId: "johnnypinaslive",
      storageBucket: "johnnypinaslive.firebasestorage.app",
      messagingSenderId: "755828275985",
      appId: "1:755828275985:web:1c80f5367d7d409f6daab0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const postsRef = ref(db, 'posts');
    const trafficRef = ref(db, 'traffic');

    const map = L.map('map').setView([12.8797, 121.7740], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // Post Update
    window.postToMap = function() {
        const name = document.getElementById('userName').value;
        const text = document.getElementById('statusUpdate').value;
        if(name && text) {
            const lat = 10.245 + (Math.random() * 0.2);
            const lng = 123.790 + (Math.random() * 0.2);
            push(postsRef, { username: name, message: text, coords: [lat, lng], timestamp: Date.now() });
            document.getElementById('statusUpdate').value = "";
            alert("Update Posted!");
        }
    }

    // Post Traffic
    window.postTraffic = function() {
        const start = document.getElementById('startCoord').value.split(',');
        const end = document.getElementById('endCoord').value.split(',');
        const color = document.getElementById('trafficStatus').value;

        if(start.length === 2 && end.length === 2) {
            push(trafficRef, {
                start: [parseFloat(start[0]), parseFloat(start[1])],
                end: [parseFloat(end[0]), parseFloat(end[1])],
                color: color
            });
            alert("Traffic line posted!");
        } else {
            alert("Enter coordinates as: Lat,Lng");
        }
    }

    // Listeners
    onChildAdded(postsRef, (data) => {
        const post = data.val();
        L.marker(post.coords).addTo(map).bindPopup(`<b>${post.username}</b><br>${post.message}`);
    });

    onChildAdded(trafficRef, (data) => {
        const line = data.val();
        L.polyline([line.start, line.end], { color: line.color, weight: 6, opacity: 0.8 }).addTo(map);
    });
</script>

</body>
</html>
